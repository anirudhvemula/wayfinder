<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Wayfinder</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #12141C;
    --ink-deep: #0A0C12;
    --parchment: #EFE6D3;
    --amber: #C9954C;
    --amber-soft: rgba(201, 149, 76, 0.35);
    --ash: #8A7B67;
    --text-on-dark: #EAE3D3;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    height: 100%;
    background: var(--ink);
    color: var(--text-on-dark);
    font-family: 'Inter', sans-serif;
    overflow: hidden;
  }

  @media (prefers-reduced-motion: reduce) {
    * { animation: none !important; transition: none !important; }
  }

  .scene {
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 900px 700px at 50% 20%, rgba(201,149,76,0.08) 0%, transparent 60%),
      radial-gradient(ellipse 1200px 900px at 50% 110%, rgba(92,122,94,0.06) 0%, transparent 55%),
      linear-gradient(180deg, var(--ink-deep) 0%, var(--ink) 45%, var(--ink-deep) 100%);
    z-index: 0;
  }

  .vignette {
    position: fixed;
    inset: 0;
    z-index: 1;
    pointer-events: none;
    box-shadow: inset 0 0 220px 60px rgba(0,0,0,0.55);
  }

  .embers {
    position: fixed;
    inset: 0;
    z-index: 1;
    pointer-events: none;
    overflow: hidden;
  }

  .ember {
    position: absolute;
    bottom: -20px;
    width: 3px;
    height: 3px;
    border-radius: 50%;
    background: var(--amber);
    box-shadow: 0 0 6px 2px var(--amber-soft);
    opacity: 0;
    animation: rise linear infinite;
  }

  @keyframes rise {
    0% { transform: translateY(0) translateX(0); opacity: 0; }
    8% { opacity: 0.8; }
    90% { opacity: 0.3; }
    100% { transform: translateY(-110vh) translateX(var(--drift, 30px)); opacity: 0; }
  }

  /* ---------- Merlin presence ---------- */
  #agent-mount {
    position: fixed;
    top: 0;
    left: 0;
    z-index: 2;
    width: 124px;
    height: 93px;
    pointer-events: none;
  }

  .brand {
    position: fixed;
    top: 28px;
    left: 32px;
    z-index: 3;
  }

  .brand-name {
    font-family: 'Fraunces', serif;
    font-size: 22px;
    font-weight: 500;
    letter-spacing: 0.3px;
    color: var(--text-on-dark);
  }

  .brand-tagline {
    font-size: 12px;
    color: var(--ash);
    margin-top: 2px;
    font-style: italic;
    font-family: 'Fraunces', serif;
  }

  .chat-column {
    position: fixed;
    inset: 0;
    z-index: 3;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 110px 24px 24px;
    pointer-events: none;
  }

  .chat-scroll {
    width: min(600px, 92vw);
    flex: 1;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 18px;
    padding: 8px 4px 24px;
    pointer-events: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--ash) transparent;
  }

  .chat-scroll::-webkit-scrollbar { width: 6px; }
  .chat-scroll::-webkit-scrollbar-thumb { background: rgba(138,123,103,0.4); border-radius: 3px; }

  .msg {
    max-width: 88%;
    animation: settle 0.5s ease-out;
  }

  @keyframes settle {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .msg-you {
    align-self: flex-end;
    text-align: right;
  }

  .msg-you .msg-body {
    display: inline-block;
    text-align: left;
    background: rgba(239, 230, 211, 0.06);
    border: 1px solid rgba(239, 230, 211, 0.12);
    padding: 10px 14px;
    border-radius: 3px;
    font-size: 14px;
    line-height: 1.55;
    color: var(--text-on-dark);
  }

  .msg-wayfinder {
    align-self: flex-start;
  }

  .msg-wayfinder .msg-label {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-size: 12px;
    color: var(--amber);
    margin-bottom: 4px;
    letter-spacing: 0.2px;
  }

  .msg-wayfinder .msg-body {
    font-size: 15px;
    line-height: 1.65;
    color: var(--parchment);
    text-shadow: 0 0 18px rgba(201,149,76,0.12);
    white-space: pre-wrap;
  }

  .status-line {
    font-size: 12px;
    color: var(--ash);
    font-style: italic;
    font-family: 'Fraunces', serif;
    align-self: flex-start;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .status-line .flicker-dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: var(--amber);
    animation: flicker 1.3s ease-in-out infinite;
  }

  @keyframes flicker {
    0%, 100% { opacity: 0.3; }
    50% { opacity: 1; }
  }

  .input-dock {
    width: min(600px, 92vw);
    pointer-events: auto;
    position: relative;
  }

  .input-shell {
    display: flex;
    align-items: center;
    gap: 10px;
    background: rgba(18, 20, 28, 0.85);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(201,149,76,0.25);
    border-radius: 4px;
    padding: 6px 6px 6px 16px;
    box-shadow: 0 0 0 1px rgba(0,0,0,0.3), 0 8px 24px rgba(0,0,0,0.4);
  }

  .input-shell:focus-within {
    border-color: var(--amber);
    box-shadow: 0 0 0 1px rgba(0,0,0,0.3), 0 0 24px rgba(201,149,76,0.15), 0 8px 24px rgba(0,0,0,0.4);
  }

  #prompt-input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text-on-dark);
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    padding: 10px 0;
  }

  #prompt-input::placeholder {
    color: var(--ash);
    font-style: italic;
  }

  #send-btn {
    background: var(--amber);
    color: var(--ink-deep);
    border: none;
    border-radius: 3px;
    padding: 9px 18px;
    font-family: 'Fraunces', serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s ease, transform 0.1s ease;
    white-space: nowrap;
  }

  #send-btn:hover:not(:disabled) { background: #DBA85E; }
  #send-btn:active:not(:disabled) { transform: scale(0.97); }
  #send-btn:disabled { opacity: 0.45; cursor: default; }
  #send-btn:focus-visible, #prompt-input:focus-visible { outline: 2px solid var(--amber); outline-offset: 2px; }

  .input-hint {
    font-size: 11px;
    color: var(--ash);
    text-align: center;
    margin-top: 10px;
    line-height: 1.5;
  }

  .top-note {
    position: fixed;
    top: 28px;
    right: 32px;
    z-index: 3;
    font-size: 11px;
    color: var(--ash);
    max-width: 260px;
    text-align: right;
    line-height: 1.5;
    pointer-events: none;
  }

  @media (max-width: 820px) {
    .chat-column { padding-top: 100px; }
    .brand { top: 20px; left: 20px; }
    .top-note { display: none; }
  }
</style>
</head>
<body>

<div class="scene"></div>
<div class="vignette"></div>
<div class="embers" id="embers"></div>

<div id="agent-mount"></div>

<div class="brand">
  <div class="brand-name">Wayfinder</div>
  <div class="brand-tagline">Someone to talk it through with.</div>
</div>

<div class="top-note">A conversational companion for fun — not therapy, counseling, or medical advice.</div>

<div class="chat-column">
  <div class="chat-scroll" id="chat-scroll"></div>

  <div class="input-dock">
    <div class="input-shell">
      <input type="text" id="prompt-input" placeholder="What's on your mind?" autocomplete="off">
      <button id="send-btn">Send</button>
    </div>
    <div class="input-hint">Wayfinder offers a listening ear and perspective — not a substitute for a therapist, counselor, or doctor. Nothing you type is saved once you close this tab.</div>
  </div>
</div>

<script type="module">
import { initAgent } from "https://cdn.jsdelivr.net/npm/clippyjs/dist/index.mjs";
import * as agents from "https://cdn.jsdelivr.net/npm/clippyjs/dist/agents/index.mjs";

const mount = document.getElementById('agent-mount');
const chatScroll = document.getElementById('chat-scroll');
const promptInput = document.getElementById('prompt-input');
const sendBtn = document.getElementById('send-btn');
const emberField = document.getElementById('embers');

const API_ENDPOINT = "https://wayfinder-five-lyart.vercel.app/api/chat";

let conversationHistory = [];
let agent = null;
let allAnimNames = [];
let wanderTimer = null;
let wandering = true;

function spawnEmbers(count = 22) {
  emberField.innerHTML = '';
  for (let i = 0; i < count; i++) {
    const e = document.createElement('div');
    e.className = 'ember';
    const left = Math.random() * 100;
    const duration = 9 + Math.random() * 10;
    const delay = Math.random() * 14;
    const drift = (Math.random() * 80 - 40) + 'px';
    e.style.left = left + 'vw';
    e.style.setProperty('--drift', drift);
    e.style.animationDuration = duration + 's';
    e.style.animationDelay = -delay + 's';
    emberField.appendChild(e);
  }
}
spawnEmbers();

async function loadAgent(name) {
  agent = await initAgent(agents[name], { container: mount });
  agent.show();
  allAnimNames = agent.animations ? agent.animations() : [];
  const idleName = allAnimNames.find(a => /idle|rest/i.test(a)) || allAnimNames[0];
  if (idleName) agent.play(idleName);
  positionMountRandomly();
  scheduleWander();
}

function randomSpot() {
  const margin = 60;
  const w = window.innerWidth;
  const h = window.innerHeight;
  const zones = [
    { xMin: margin, xMax: w * 0.22, yMin: margin, yMax: h - 220 },
    { xMin: w * 0.78, xMax: w - 140, yMin: margin, yMax: h - 220 },
    { xMin: margin, xMax: w - 140, yMin: margin, yMax: h * 0.35 }
  ];
  const z = zones[Math.floor(Math.random() * zones.length)];
  const x = z.xMin + Math.random() * Math.max(1, z.xMax - z.xMin);
  const y = z.yMin + Math.random() * Math.max(1, z.yMax - z.yMin);
  return { x, y };
}

function positionMountRandomly() {
  // Initial placement only (no walk animation needed pre-load).
  const { x, y } = randomSpot();
  mount.style.left = `${x}px`;
  mount.style.top = `${y}px`;
}

function scheduleWander() {
  clearTimeout(wanderTimer);
  const delay = 9000 + Math.random() * 9000;
  wanderTimer = setTimeout(() => {
    if (wandering && agent) {
      const { x, y } = randomSpot();
      // moveTo animates Merlin walking to the destination (uses his walk
      // animation and moves the element progressively), rather than
      // teleporting the container.
      agent.moveTo(x, y);
    }
    scheduleWander();
  }, delay);
}

await loadAgent('Merlin');
console.log('Animations loaded:', allAnimNames.length, allAnimNames);

function addYouMessage(text) {
  const div = document.createElement('div');
  div.className = 'msg msg-you';
  div.innerHTML = `<div class="msg-body"></div>`;
  div.querySelector('.msg-body').textContent = text;
  chatScroll.appendChild(div);
  chatScroll.scrollTop = chatScroll.scrollHeight;
}

function addWayfinderMessage(text) {
  const div = document.createElement('div');
  div.className = 'msg msg-wayfinder';
  div.innerHTML = `<div class="msg-label">Merlin</div><div class="msg-body"></div>`;
  div.querySelector('.msg-body').textContent = text;
  chatScroll.appendChild(div);
  chatScroll.scrollTop = chatScroll.scrollHeight;
}

function addStatusLine(text) {
  const div = document.createElement('div');
  div.className = 'status-line';
  div.innerHTML = `<span class="flicker-dot"></span><span>${text}</span>`;
  chatScroll.appendChild(div);
  chatScroll.scrollTop = chatScroll.scrollHeight;
  return div;
}

const SYSTEM_PROMPT_BASE = "You are a friendly conversational companion. Do not claim to be a therapist, counselor, doctor, or authority. If the user appears distressed, overwhelmed, isolated, or repeatedly seeks serious life advice, gently encourage them to speak with a trusted friend, family member, mentor, advisor, or mental health professional. Your purpose is companionship and reflection only. Keep replies warm, concise (2-5 sentences typically), and conversational.";

function buildSystemPrompt() {
  // Animation selection now happens in a separate, dedicated classifier call
  // server-side (see chat.js) — this prompt stays focused purely on the
  // conversational reply, which keeps it shorter and more reliably followed.
  return SYSTEM_PROMPT_BASE;
}

async function askLLM(userText) {
  conversationHistory.push({ role: 'user', content: userText });
  const response = await fetch(API_ENDPOINT, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      systemPrompt: buildSystemPrompt(),
      messages: conversationHistory,
      animationNames: allAnimNames
    })
  });
  if (!response.ok) throw new Error(`Server responded ${response.status}`);
  const data = await response.json();
  return {
    text: data.text || "",
    animations: Array.isArray(data.animations) ? data.animations : []
  };
}

async function handleAsk() {
  const text = promptInput.value.trim();
  if (!text || sendBtn.disabled) return;

  sendBtn.disabled = true;
  promptInput.disabled = true;
  addYouMessage(text);
  promptInput.value = '';

  wandering = false;
  const statusEl = addStatusLine('Merlin is thinking...');
  const thinkingName = allAnimNames.find(a => /think|process|search/i.test(a));
  if (agent && thinkingName) agent.play(thinkingName);

  try {
    const { text: replyText, animations } = await askLLM(text);
    statusEl.remove();

    const cleanText = replyText.trim();

    addWayfinderMessage(cleanText || "I'm not sure what to say to that — could you say it another way?");
    conversationHistory.push({ role: 'assistant', content: cleanText });

    // Play whatever animations the classifier picked. Fallback: if none came
    // back (classifier call failed, or picked nothing sensible), play a
    // random known-good animation so Merlin never just sits frozen.
    const toPlay = animations.length > 0
      ? animations
      : (allAnimNames.length > 0 ? [allAnimNames[Math.floor(Math.random() * allAnimNames.length)]] : []);

    for (const name of toPlay) {
      if (agent && allAnimNames.includes(name)) agent.play(name);
    }

    if (cleanText && agent) {
      try { await agent.speak(cleanText, { tts: true }); } catch { agent.speak(cleanText); }
    }
  } catch (err) {
    statusEl.remove();
    addWayfinderMessage("Something interrupted my thoughts — let's try that again in a moment.");
    console.error(err);
  } finally {
    sendBtn.disabled = false;
    promptInput.disabled = false;
    promptInput.focus();
    wandering = true;
  }
}

sendBtn.addEventListener('click', handleAsk);
promptInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') handleAsk(); });
promptInput.focus();
</script>

</body>
</html>
